<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>FitMeal Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
   * {
      transition: all 0.3s ease;
    }
    a{
      text-decoration: none;

    }

    body {
      background:linear-gradient(135deg, #11998e, #38ef7d);
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
      
    }
    .navbar {
      backdrop-filter: blur(12px);
      background: rgba(0, 176, 155, 0.75) !important;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    #Brandname {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      text-shadow: none;
    }
    @keyframes navbarFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .navbar-nav .nav-link:hover {
      background-color: #ecf01e81;
      color: #fff;
      transform: scale(1.1);
      border: 2px solid white;
      box-shadow: 0 4px 15px rgba(25, 135, 84, 0.6);
      transition: all 0.3s ease;
    }
    .navbar .btn:hover {
      background-color: #ebee4c;
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 4px 15px rgba(25, 135, 84, 0.6);
      transition: all 0.3s ease;
    }
    
    .navbar-brand img {
      width: 90px;
      height: 80px;
      border-radius: 35%;
      margin-right: 10px;
      background: linear-gradient(90deg, #00b09b, #96c93d, #00d4aa, #a8e637);
      background-size: 300% 300%;
     
  
      transition:transform 0.3s ease;
    }
    .navbar-brand img:hover {
   transform: perspective(300px) rotateY(10deg) scale(1.1);
}

@keyframes move {
  from {
    top: 0;
    left: 0;
  }
  to {
    top: 0;
    left: 100%;
  }
}  
  @media (max-width: 768px) {
  .navbar-collapse {
    position: absolute;
    top: 0; /* navbar height ke according adjust */
    left: 0;
    width: 220px;
    background: rgba(0, 176, 155, 0.95);
    padding: 15px;
    border-radius: 0 12px 12px 0;
    box-shadow: 2px 0 10px rgba(0,0,0,0.3);
  }

  .navbar-nav {
    align-items: flex-start !important;
  }
}
/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0 !important;
  left: -260px;
  width: 260px;
  height: 100vh;
  background: rgba(255, 255, 255, 0.712);
 backdrop-filter: blur(12px);
  
  z-index: 10000;
  transition: left 0.3s ease;
  padding: 20px;
  overflow-y: auto;
  
}

.sidebar.active {
  left: 0;
}

/* Sidebar links */
.sidebar a {
  display: block;
  padding: 12px 0;
  color: #333;
  font-weight: 500;
  border-bottom: 1px solid #eee;
}

/* Overlay */
#overlay {
  position:fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.4);
  z-index: 9999;
  backdrop-filter: blur(1px);
  display: none;
}

#overlay.active {
  display: block;
}



h1 {
  text-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
#chatContainer {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    max-width: 600px;
    margin: 40px auto;
    color: #fff;
  }

  #chatOutput {
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 10px;
    min-height: 250px;
    max-height: 400px;
    overflow-y: auto;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
  }

  #chatInputContainer {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  #chatInput {
    flex: 1;
    border-radius: 50px;
    padding: 10px 20px;
    border: none;
    outline: none;
  }

  #chatInput:focus {
    box-shadow: 0 0 8px #00ff90;
  }

  #chatOutput .user-msg {
    background: #00b09b;
    padding: 8px 12px;
    border-radius: 12px;
    margin: 5px 0;
    display: inline-block;
  }

  #chatOutput .bot-msg {
    background: #38ef7d;
    padding: 8px 12px;
    border-radius: 12px;
    margin: 5px 0;
    display: inline-block;
  }
</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg shadow-sm sticky-top"
     style="background: linear-gradient(90deg, #00b09b, #96c93d);">

  <div class="container py-2 d-flex align-items-center justify-content-between">

    <!-- LEFT SIDE -->
    <div class="d-flex align-items-center">

      <!-- ✅ MENU BUTTON LEFT -->
      <button id="menuBtn" class="navbar-toggler border-0 text-white me-2" type="button">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- LOGO -->
      <a class="navbar-brand d-flex align-items-center text-white fw-bold m-0"
         href="/home">
        <img src="{{ url_for('static', filename='images/logo.png') }}">
      </a>

      <!-- BRAND -->
      <span id="Brandname">FitMeal</span>

    </div>

    <!-- RIGHT SIDE NAV -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-center">
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/home">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/preferences">Preferences</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/recipes">Recipes</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold active" href="/mealplan">Meal Plan</a></li>
        <li class="nav-item mx-2">
          <a class="nav-link text-white fw-semibold" href="/chat">Chatbot</a>
        </li>
       
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/report">Report</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/about">About</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/contact">Contact</a></li>
        <li class="nav-item ms-3">
          <a href="/" class="btn btn-light text-success fw-bold px-3 py-1 rounded-pill shadow-sm">Sign Up</a>
        </li>
      </ul>
    </div>

  </div>
</nav>

  <!-- 🔥 SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-content">

    <h5 class="mb-4 fw-bold">Menu</h5>
    <a href="/home">Home</a>
    <a href="/preferences">Preferences</a>
    <a href="/recipes">Recipes</a>
    <a href="/mealplan">Meal Plan</a>
    <a href="/chat">Chatbot</a>

    <a href="/report">Report</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
     <a href="/" class="btn btn-light text-success fw-bold px-3 py-1 rounded-pill shadow-sm">Sign Up</a>


  </div>
</div>  
<div id="overlay"></div>
 <div id="chatContainer">
  <h3 class="mb-3">Ask me anything about your diet! 🍽️</h3>
  
  <div id="chatOutput"></div>
  
  <div id="chatInputContainer">
    <input id="chatInput" type="text" placeholder="Type here...">
    <button class="btn btn-success rounded-pill px-4" onclick="askBot()">Ask</button>
  </div>
</div>

<script>
function askBot() {
    let query = document.getElementById("chatInput").value;
    if(!query) return;

    let output = document.getElementById("chatOutput");
    output.innerHTML += `You: ${query}\n`;

    fetch("/chatbot", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({query: query})
    })
    .then(res=>res.json())
    .then(data=>{
        output.innerHTML += `Bot: ${data.response}\n\n`;
        document.getElementById("chatInput").value = "";
        output.scrollTop = output.scrollHeight;
    })
    .catch(err=>{
        output.innerHTML += "Bot: Oops! Error occurred.\n\n";
        console.error(err);
    });
}

 // Navbar auto close on click
const navLinks = document.querySelectorAll('.nav-link');
const navbarCollapse = document.querySelector('.navbar-collapse');

navLinks.forEach(link => {
  link.addEventListener('click', () => {
    if (navbarCollapse.classList.contains('show')) {
      new bootstrap.Collapse(navbarCollapse).hide();
    }
  });
});

// sidebar open-close fix
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", () => {
  sidebar.classList.add("active");
  overlay.classList.add("active");
  document.body.style.overflow = "hidden"; // 🔥 scroll lock
});

overlay.addEventListener("click", () => {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
  document.body.style.overflow = "auto"; // 🔥 unlock
});

</script>



</body>
</html>
