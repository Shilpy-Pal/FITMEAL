<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitMeal | Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      transition: all 0.3s ease;
    }
    a{
      text-decoration: none;

    }

    body {
      
      background: url("/static/images/signupbackround.jpg")
      no-repeat center/cover;
    
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
      
    }
    .navbar {
      backdrop-filter: blur(12px);
      background: rgba(0, 176, 155, 0.75) !important;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    #Brandname {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      text-shadow: none;
    }
    @keyframes navbarFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .navbar-nav .nav-link:hover {
      background-color: #ecf01e81;
      color: #fff;
      transform: scale(1.1);
      border: 2px solid white;
      box-shadow: 0 4px 15px rgba(25, 135, 84, 0.6);
      transition: all 0.3s ease;
    }
    .navbar .btn:hover {
      background-color: #ebee4c;
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 4px 15px rgba(25, 135, 84, 0.6);
      transition: all 0.3s ease;
    }
    
    .navbar-brand img {
      width: 90px;
      height: 80px;
      border-radius: 35%;
      margin-right: 10px;
      background: linear-gradient(90deg, #00b09b, #96c93d, #00d4aa, #a8e637);
      background-size: 300% 300%;
     
  
      transition:transform 0.3s ease;
    }
    .navbar-brand img:hover {
   transform: perspective(300px) rotateY(10deg) scale(1.1);
}

@keyframes move {
  from {
    top: 0;
    left: 0;
  }
  to {
    top: 0;
    left: 100%;
  }
}  
  @media (max-width: 768px) {
  .navbar-collapse {
    position: absolute;
    top: 0; /* navbar height ke according adjust */
    left: 0;
    width: 220px;
    background: rgba(0, 176, 155, 0.95);
    padding: 15px;
    border-radius: 0 12px 12px 0;
    box-shadow: 2px 0 10px rgba(0,0,0,0.3);
  }

  .navbar-nav {
    align-items: flex-start !important;
  }
}
/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0 !important;
  left: -260px;
  width: 260px;
  height: 100vh;
  background: rgba(255, 255, 255, 0.712);
 backdrop-filter: blur(12px);
  
  z-index: 10000;
  transition: left 0.3s ease;
  padding: 20px;
  overflow-y: auto;
  
}

.sidebar.active {
  left: 0;
}

/* Sidebar links */
.sidebar a {
  display: block;
  padding: 12px 0;
  color: #333;
  font-weight: 500;
  border-bottom: 1px solid #eee;
}

/* Overlay */
#overlay {
  position:fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.4);
  z-index: 9999;
  backdrop-filter: blur(1px);
  display: none;
}

#overlay.active {
  display: block;
}
.card shadow p-4{
  background: rgba(190, 176, 176, 0.938);
  
  opacity: 20;
}   
  </style>
</head>
<body class="bg-light">

 <!-- Navbar -->
  <nav class="navbar navbar-expand-lg shadow-sm sticky-top"
     style="background: linear-gradient(90deg, #00b09b, #96c93d);">

  <div class="container py-2 d-flex align-items-center justify-content-between">

    <!-- LEFT SIDE -->
    <div class="d-flex align-items-center">

      <!-- ✅ MENU BUTTON LEFT -->
      <button id="menuBtn" class="navbar-toggler border-0 text-white me-2" type="button">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- LOGO -->
      <a class="navbar-brand d-flex align-items-center text-white fw-bold m-0"
         href="/home">
        <img src="{{ url_for('static', filename='images/logo.png') }}">
      </a>

      <!-- BRAND -->
      <span id="Brandname">FitMeal</span>

    </div>

    <!-- RIGHT SIDE NAV -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-center">
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/home">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/preferences">Preferences</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/recipes">Recipes</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold active" href="/mealplan">Meal Plan</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/report">Report</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/about">About</a></li>
        <li class="nav-item mx-2"><a class="nav-link text-white fw-semibold" href="/contact">Contact</a></li>
        <li class="nav-item ms-3">
          <a href="/" class="btn btn-light text-success fw-bold px-3 py-1 rounded-pill shadow-sm">Sign Up</a>
        </li>
      </ul>
    </div>

  </div>
</nav>

  <!-- 🔥 SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-content">

    <h5 class="mb-4 fw-bold">Menu</h5>

    <a href="/home">Home</a>
    <a href="/preferences">Preferences</a>
    <a href="/recipes">Recipes</a>
    <a href="/mealplan">Meal Plan</a>
    <a href="/report">Report</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>

  </div>
</div>  
<div id="overlay"></div>
 

  <!-- Signup Form -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow p-4">
          <h3 class="text-center mb-4 text-success fw-bold">Create Your Account</h3>

          <!-- Updated Form With Backend Ready Action -->
          <form action="/signup" method="POST">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required minlength="2">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Create Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold">Next</button>
          </form>

          <p class="text-center mt-3">Already have an account? <a href="/login" class="text-success fw-semibold">Login here</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Navbar auto close on click
const navLinks = document.querySelectorAll('.nav-link');
const navbarCollapse = document.querySelector('.navbar-collapse');

navLinks.forEach(link => {
  link.addEventListener('click', () => {
    if (navbarCollapse.classList.contains('show')) {
      new bootstrap.Collapse(navbarCollapse).hide();
    }
  });
});

// sidebar open-close fix
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.addEventListener("click", () => {
  sidebar.classList.add("active");
  overlay.classList.add("active");
  document.body.style.overflow = "hidden"; // 🔥 scroll lock
});

overlay.addEventListener("click", () => {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
  document.body.style.overflow = "auto"; // 🔥 unlock
});

  </script>
</body>
</html>
